syntax = "proto3";

package common.v1;

// A JWT token claim.
message Auth {
  // The user ID.
  string user_id = 1;
  // The expiration date as a Unix timestamp.
  uint64 exp = 2;
}

// A timestamp in milliseconds since the Unix epoch.
//
// We can't use google.protobuf.Timestamp,
// because it doesn't implement `SurrealValue`.
message Timestamp {
  // The timestamp in milliseconds since the Unix epoch.
  uint64 millis = 1;
}

// Message represents an error that occurred during a request.
message Error {
  // The error code.
  ErrorCode code = 1;
  // The error message.
  string message = 2;
}

// The code of an error.
enum ErrorCode {
  // The error code is unspecified/unknown. Should not be used.
  ERROR_CODE_UNSPECIFIED = 0;
  // Internal Error.
  ERROR_CODE_INTERNAL = 1;
  // Indicates the request was unauthorized.
  ERROR_CODE_UNAUTHORIZED = 2;
  // Indicates the requested item was not found.
  ERROR_CODE_NOT_FOUND = 3;
  // Indicates the requested item already exists.
  ERROR_CODE_ALREADY_EXISTS = 4;
  // Indicates the request format was invalid.
  ERROR_CODE_INVALID_FORMAT = 5;
  // Indicates the user is not allowed to perform this action.
  //
  // Unlike `ERROR_CODE_UNAUTHORIZED`,
  // this error is caused by policy violation or permission restrictions.
  ERROR_CODE_RESTRICTED = 6;
}
