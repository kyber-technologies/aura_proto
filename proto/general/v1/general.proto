syntax = "proto3";

package general.v1;

// Service for general server mechanics.
service GeneralService {
  // Get the server configuration.
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);

  // Clear the server state for a new test.
  //
  // Only available in testing mode.
  rpc ClearState(ClearStateRequest) returns (ClearStateResponse);

  // Get an email verification token.
  //
  // Only available in testing mode.
  rpc GetEmailToken(GetEmailTokenRequest) returns (GetEmailTokenResponse);
}

// A request to get the server configuration.
message GetConfigRequest {}

// A response from a request to get the server configuration.
message GetConfigResponse {
  // The server API version.
  string version = 1;
  // The chunk size to use for resource operations.
  uint32 resource_chunk_size = 2;
}

// A request to clear the server state.
//
// Only available in testing mode.
message ClearStateRequest {}

// A response from a request to clear the server state.
//
// Only available in testing mode.
message ClearStateResponse {}

// A request to get an email verification token.
//
// Only available in testing mode.
message GetEmailTokenRequest {
  // The email address to get a token for.
  string email = 1;
}

// A response from a request to get an email verification token.
//
// Only available in testing mode.
message GetEmailTokenResponse {
  // The email verification token.
  string token = 1;
}
